# Garante que o diretório de migrações Alembic está íntegro (um único head).
name: Backend schema

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-schema.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-schema.yml"

jobs:
  alembic-heads:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/verify_single_alembic_head.py
